<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cafe White Saffron - Online Order System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f4f4;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: #1a1a2e;
            color: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px 8px 0 0;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.8;
        }

        /* Two column layout */
        .main-content {
            display: flex;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .menu-section {
            flex: 2;
            min-width: 300px;
        }

        .order-section {
            flex: 1;
            min-width: 280px;
        }

        /* Cards */
        .card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            overflow: hidden;
        }

        .card-header {
            background: #2c3e50;
            color: white;
            padding: 12px 15px;
            font-weight: bold;
            font-size: 16px;
        }

        .card-body {
            padding: 15px;
        }

        /* Search */
        .search-box {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            margin-bottom: 15px;
        }

        /* Category styling */
        .category {
            margin-bottom: 15px;
            border: 1px solid #eee;
            border-radius: 6px;
            overflow: hidden;
        }

        .category-title {
            background: #ecf0f1;
            padding: 10px 15px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .category-title:hover {
            background: #e0e4e8;
        }

        .category-count {
            background: #95a5a6;
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
        }

        .items-list {
            display: none;
            padding: 5px 0;
        }

        .items-list.open {
            display: block;
        }

        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 15px;
            border-bottom: 1px solid #f0f0f0;
            cursor: pointer;
            transition: background 0.2s;
        }

        .menu-item:hover {
            background: #f8f9fa;
        }

        .item-name {
            font-size: 14px;
        }

        .item-price {
            font-weight: bold;
            color: #27ae60;
            font-size: 14px;
        }

        /* Order summary */
        .order-items {
            max-height: 350px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .order-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 13px;
        }

        .order-item-info {
            flex: 2;
        }

        .order-item-quantity {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .qty-btn {
            background: #ecf0f1;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        .qty-btn:hover {
            background: #bdc3c7;
        }

        .order-item-price {
            min-width: 70px;
            text-align: right;
            font-weight: bold;
        }

        .remove-item {
            color: #e74c3c;
            cursor: pointer;
            margin-left: 10px;
            font-weight: bold;
        }

        .order-total {
            border-top: 2px solid #ddd;
            padding-top: 10px;
            margin-top: 10px;
            text-align: right;
            font-size: 18px;
            font-weight: bold;
        }

        /* Form styling */
        .form-group {
            margin-bottom: 12px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 4px;
            color: #555;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 8px 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .btn-primary {
            background: #27ae60;
            color: white;
        }

        .btn-primary:hover {
            background: #219a52;
        }

        .btn-secondary {
            background: #95a5a6;
            color: white;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: #7f8c8d;
        }

        .hidden {
            display: none;
        }

        .badge {
            background: #e74c3c;
            color: white;
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 11px;
            margin-left: 8px;
        }

        .empty-message {
            text-align: center;
            color: #999;
            padding: 20px;
            font-size: 14px;
        }

        hr {
            margin: 15px 0;
            border: none;
            border-top: 1px solid #eee;
        }

        @media (max-width: 768px) {
            .main-content {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>Cafe White Saffron</h1>
        <p>Maldives | Phone: 7667734</p>
    </div>

    <div class="main-content">
        <!-- Menu Section -->
        <div class="menu-section">
            <div class="card">
                <div class="card-header">
                    Menu
                </div>
                <div class="card-body">
                    <input type="text" id="searchInput" class="search-box" placeholder="Search menu items...">
                    <div id="menuContainer"></div>
                </div>
            </div>
        </div>

        <!-- Order Section -->
        <div class="order-section">
            <div class="card">
                <div class="card-header">
                    Your Order
                </div>
                <div class="card-body">
                    <div id="orderItems" class="order-items">
                        <div class="empty-message">No items selected</div>
                    </div>
                    <div id="orderTotal" class="order-total">Total: MVR 0.00</div>
                    <button id="clearOrderBtn" class="btn btn-secondary">Clear Order</button>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    Customer Information
                </div>
                <div class="card-body">
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" id="customerName" placeholder="Enter full name">
                    </div>
                    <div class="form-group">
                        <label>Mobile Number *</label>
                        <input type="tel" id="customerMobile" placeholder="Enter mobile number">
                    </div>
                    <div class="form-group">
                        <label>Address</label>
                        <input type="text" id="customerAddress" placeholder="Delivery address">
                    </div>
                    <div class="form-group">
                        <label>Order Type</label>
                        <select id="orderType">
                            <option value="Delivery">Delivery</option>
                            <option value="Pickup">Pickup</option>
                            <option value="Reservation">Reservation</option>
                        </select>
                    </div>
                    <div id="reservationFields" class="hidden">
                        <div class="form-group">
                            <label>Number of People</label>
                            <input type="number" id="pax" placeholder="Pax">
                        </div>
                        <div class="form-group">
                            <label>Date</label>
                            <input type="date" id="reservationDate">
                        </div>
                        <div class="form-group">
                            <label>Time</label>
                            <input type="time" id="reservationTime">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Payment Method</label>
                        <select id="paymentMethod">
                            <option value="Cash">Cash</option>
                            <option value="Card">Card</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Special Requests</label>
                        <textarea id="specialRequests" placeholder="Any special requests..."></textarea>
                    </div>
                    <button id="submitOrderBtn" class="btn btn-primary">Submit Order via WhatsApp</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let menuData = {};
    let currentOrder = [];

    // Load CSV file
    async function loadCSV() {
        try {
            const response = await fetch('menu.csv');
            const csvText = await response.text();
            parseCSV(csvText);
        } catch (error) {
            document.getElementById('menuContainer').innerHTML = '<div class="empty-message">Error loading menu.csv. Please ensure the file exists.</div>';
        }
    }

    function parseCSV(csvText) {
        const lines = csvText.split('\n');
        const categories = {};

        for (let i = 1; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;

            const parts = line.split(',');
            if (parts.length >= 3) {
                const category = parts[0].trim();
                const itemName = parts[1].trim();
                const price = parseFloat(parts[2]);

                if (!categories[category]) {
                    categories[category] = [];
                }
                categories[category].push({ name: itemName, price: price });
            }
        }

        menuData = categories;
        renderMenu();
    }

    function renderMenu() {
        const container = document.getElementById('menuContainer');
        let html = '';

        for (const [category, items] of Object.entries(menuData)) {
            html += `
                <div class="category">
                    <div class="category-title" onclick="toggleCategory(this)">
                        <span>${category}</span>
                        <span class="category-count">${items.length}</span>
                    </div>
                    <div class="items-list" data-category="${category}">
            `;
            for (const item of items) {
                html += `
                    <div class="menu-item" onclick="addToOrder('${escapeHtml(item.name)}', ${item.price})">
                        <span class="item-name">${escapeHtml(item.name)}</span>
                        <span class="item-price">MVR ${item.price.toFixed(2)}</span>
                    </div>
                `;
            }
            html += `</div></div>`;
        }

        container.innerHTML = html;
    }

    function toggleCategory(element) {
        const itemsDiv = element.nextElementSibling;
        if (itemsDiv) {
            itemsDiv.classList.toggle('open');
        }
    }

    function addToOrder(name, price) {
        const existing = currentOrder.find(item => item.name === name);
        if (existing) {
            existing.quantity++;
            existing.total = existing.quantity * existing.price;
        } else {
            currentOrder.push({
                name: name,
                price: price,
                quantity: 1,
                total: price
            });
        }
        updateOrderDisplay();
    }

    function updateOrderDisplay() {
        const container = document.getElementById('orderItems');
        const totalContainer = document.getElementById('orderTotal');

        if (currentOrder.length === 0) {
            container.innerHTML = '<div class="empty-message">No items selected</div>';
            totalContainer.innerHTML = 'Total: MVR 0.00';
            return;
        }

        let html = '';
        let grandTotal = 0;

        currentOrder.forEach((item, index) => {
            grandTotal += item.total;
            html += `
                <div class="order-item">
                    <div class="order-item-info">${escapeHtml(item.name)}</div>
                    <div class="order-item-quantity">
                        <button class="qty-btn" onclick="updateQuantity(${index}, -1)">-</button>
                        <span>${item.quantity}</span>
                        <button class="qty-btn" onclick="updateQuantity(${index}, 1)">+</button>
                    </div>
                    <div class="order-item-price">MVR ${item.total.toFixed(2)}</div>
                    <div class="remove-item" onclick="removeFromOrder(${index})">×</div>
                </div>
            `;
        });

        container.innerHTML = html;
        totalContainer.innerHTML = `Total: MVR ${grandTotal.toFixed(2)}`;
    }

    function updateQuantity(index, change) {
        const item = currentOrder[index];
        if (item) {
            item.quantity += change;
            if (item.quantity <= 0) {
                currentOrder.splice(index, 1);
            } else {
                item.total = item.quantity * item.price;
            }
            updateOrderDisplay();
        }
    }

    function removeFromOrder(index) {
        currentOrder.splice(index, 1);
        updateOrderDisplay();
    }

    function clearOrder() {
        if (confirm('Clear all items from your order?')) {
            currentOrder = [];
            updateOrderDisplay();
        }
    }

    function searchMenu() {
        const searchTerm = document.getElementById('searchInput').value.toLowerCase();
        const allItems = document.querySelectorAll('.menu-item');

        allItems.forEach(item => {
            const itemName = item.querySelector('.item-name').innerText.toLowerCase();
            if (itemName.includes(searchTerm)) {
                item.style.display = 'flex';
            } else {
                item.style.display = 'none';
            }
        });
    }

    function toggleReservationFields() {
        const orderType = document.getElementById('orderType').value;
        const reservationFields = document.getElementById('reservationFields');
        reservationFields.classList.toggle('hidden', orderType !== 'Reservation');
    }

    function sendOrder() {
        const name = document.getElementById('customerName').value.trim();
        const mobile = document.getElementById('customerMobile').value.trim();
        const address = document.getElementById('customerAddress').value.trim();
        const orderType = document.getElementById('orderType').value;
        const payment = document.getElementById('paymentMethod').value;
        const special = document.getElementById('specialRequests').value.trim();

        if (!name || !mobile) {
            alert('Please enter your name and mobile number.');
            return;
        }

        let message = `CAFE WHITE SAFFRON ORDER\n\n`;
        message += `CUSTOMER DETAILS\n`;
        message += `Name: ${name}\n`;
        message += `Mobile: ${mobile}\n`;
        if (address) message += `Address: ${address}\n`;
        message += `Order Type: ${orderType}\n`;
        message += `Payment: ${payment}\n`;

        if (orderType === 'Reservation') {
            const pax = document.getElementById('pax').value;
            const date = document.getElementById('reservationDate').value;
            const time = document.getElementById('reservationTime').value;
            message += `\nRESERVATION DETAILS\n`;
            if (pax) message += `Pax: ${pax}\n`;
            if (date) message += `Date: ${date}\n`;
            if (time) message += `Time: ${time}\n`;
        } else {
            if (currentOrder.length === 0) {
                alert('Please add items to your order.');
                return;
            }

            message += `\nORDER ITEMS\n`;
            let total = 0;
            currentOrder.forEach(item => {
                total += item.total;
                message += `${item.name} x${item.quantity} = MVR ${item.total.toFixed(2)}\n`;
            });
            message += `\nTOTAL: MVR ${total.toFixed(2)}\n`;
        }

        if (special) {
            message += `\nSPECIAL REQUESTS\n${special}\n`;
        }

        message += `\nCafe White Saffron, Maldives\nPhone: 7667734`;

        const url = 'https://wa.me/7667734?text=' + encodeURIComponent(message);
        window.open(url, '_blank');
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Event listeners
    document.getElementById('clearOrderBtn').addEventListener('click', clearOrder);
    document.getElementById('submitOrderBtn').addEventListener('click', sendOrder);
    document.getElementById('searchInput').addEventListener('keyup', searchMenu);
    document.getElementById('orderType').addEventListener('change', toggleReservationFields);

    // Open first category by default
    function openFirstCategory() {
        const firstItems = document.querySelector('.items-list');
        if (firstItems) {
            firstItems.classList.add('open');
        }
    }

    // Load menu
    loadCSV();
    setTimeout(openFirstCategory, 200);
</script>

</body>
</html>
